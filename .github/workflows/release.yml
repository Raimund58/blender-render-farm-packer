name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build add-on zip
        run: |
          mkdir -p dist
          ZIP="dist/bat_render_prep-${{ steps.version.outputs.version }}.zip"
          # Strip caches just in case.
          find bat_render_prep -name '__pycache__' -type d -exec rm -rf {} +
          zip -r "$ZIP" bat_render_prep
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: bat_render_prep-${{ steps.version.outputs.version }}
          path: dist/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
